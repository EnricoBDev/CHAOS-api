services:
  api:
    build: api
    container_name: api
    expose:
      - 8000
    volumes:
      - db:/app/data
    restart: unless-stopped

  duckdns:
    image: lscr.io/linuxserver/duckdns:latest
    container_name: duckdns
    environment:
      - SUBDOMAINS=${SUBDOMAIN}
      - TOKEN=${DUCKDNS_TOKEN}
    restart: unless-stopped

  proxy:
    image: jonasal/nginx-certbot:6.0.0
    container_name: proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - nginx_secrets:/etc/letsencrypt
      - ./proxy/templates:/etc/nginx/templates
      - ./proxy/.htpasswd:/etc/nginx/.htpasswd
    environment:
      - DOMAIN=${DOMAIN}
      - BASIC_AUTH=${BASIC_AUTH:-off}
      - STAGING=${STAGING:-0}
      - CERTBOT_EMAIL=${CERTBOT_EMAIL}
      - NGINX_ENVSUBST_OUTPUT_DIR=/etc/nginx/user_conf.d
      - NGINX_ENVSUBST_FILTER=DOMAIN|BASIC_AUTH
    restart: unless-stopped
    depends_on:
      - api
      - duckdns

volumes:
  db:
  nginx_secrets:


